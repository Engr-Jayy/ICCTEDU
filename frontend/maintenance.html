<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Under Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-main: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
            padding: 20px;
        }

        .maintenance-card {
            background: var(--white);
            padding: 3.5rem 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            max-width: 480px;
            width: 100%;
            border-top: 6px solid var(--primary);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .icon-container {
            width: 90px;
            height: 90px;
            background: #e0e7ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem auto;
        }

        h1 { font-weight: 800; font-size: 1.8rem; margin-bottom: 1rem; color: var(--text-main); letter-spacing: -0.5px; }
        
        p { color: var(--text-muted); line-height: 1.6; font-size: 0.95rem; margin-bottom: 2rem; }

        .loader {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .loader span {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Button Styles */
        .btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            transition: all 0.2s; 
            font-size: 0.9rem; 
            text-decoration: none;
        }
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        .btn-outline:hover { 
            background: #f1f5f9; 
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon-container">
            <i class="fas fa-hammer"></i>
        </div>
        <h1>System Under Maintenance</h1>
        <p>The platform is currently offline for scheduled upgrades and maintenance. We are working hard to improve your experience and will be back online shortly.</p>
        
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
            <a href="index.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Return to Homepage</a>
        </div>
    </div>

    <script>
      
        setInterval(() => {
            if (localStorage.getItem('ez_maintenance_mode') === 'false') {
                window.location.replace('dashboard.html'); 
            }
        }, 2000);
    </script>

</body>
</html>
